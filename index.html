<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TogoFlix PRO - 12 Langues</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#050505;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:#000;position:sticky;top:0;z-index:100;border-bottom:3px solid #e50914;flex-wrap:wrap;gap:10px}
.logo{color:#e50914;font-weight:900;font-size:22px}
select,input[type=range]{padding:7px 10px;border-radius:20px;border:none;background:#222;color:#fff;font-size:13px}
.hero{text-align:center;padding:40px 15px;background:linear-gradient(#1a0000,#050505)}
.search{width:95%;max-width:500px;padding:12px 16px;border-radius:25px;border:none;display:block;margin:18px auto;font-size:15px}
.cat{padding:28px 18px 10px;font-size:18px;font-weight:bold;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:11px;padding:0 18px 35px}
.card{background:#161616;border-radius:10px;overflow:hidden;cursor:pointer;position:relative}
.card img{width:100%;height:200px;object-fit:cover;display:block}
.card h3{padding:7px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{position:absolute;top:5px;left:5px;background:#e50914;font-size:8px;padding:2px 5px;border-radius:4px;font-weight:bold}
#player{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:15px}
#player video{width:100%;max-width:900px;max-height:60vh;background:#000;border-radius:12px}
.bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center;margin-top:14px;background:#111;padding:10px 14px;border-radius:30px}
.bar select,.bar button{padding:6px 10px;border-radius:20px;border:none;background:#222;color:#fff;cursor:pointer;font-size:12px}
.close{position:absolute;top:12px;right:16px;font-size:28px;cursor:pointer}
footer{text-align:center;padding:25px;color:#555;font-size:12px;border-top:1px solid #222}
</style>
</head>
<body>
<header>
<div class="logo">TOGOFLIX PRO 🇹🇬</div>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
<select id="lang" onchange="setLang(this.value)">
<option value="fr">🇫🇷 Français</option>
<option value="en">🇬🇧 English</option>
<option value="de">🇩🇪 Deutsch</option>
<option value="es">🇪🇸
