<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TogoFlix - Le Netflix du Togo</title>
<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white}
header{background:#000;padding:15px;text-align:center;border-bottom:3px solid #e50914}
.logo{font-size:28px;font-weight:bold;color:#e50914}
.search{margin:15px auto;display:block;width:90%;max-width:400px;padding:12px;border-radius:25px;border:none;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;padding:20px}
.card{background:#1a1a1a;border-radius:8px;overflow:hidden;cursor:pointer;transition:0.3s}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:220px;object-fit:cover}
.card h3{padding:10px;font-size:14px;margin:0}
.btn{margin:5px;padding:6px 10px;border:none;border-radius:15px;background:#222;color:white;cursor:pointer}
.btn.active{background:#e50914}
.lang-bar{text-align:center;padding:10px}
</style>
</head>
<body>
<header>
<div class="logo">TOGOFLIX 🇹🇬</div>
<div>Le Netflix 100% Togolais</div>
</header>

<input class="search" id="search" placeholder="Rechercher film, série..." onkeyup="filtrer()">

<div class="lang-bar">
<button class="btn active" onclick="filterLang('all',this)">Tout</button>
<button class="btn" onclick="filterLang('fr',this)">Français</button>
<button class="btn" onclick="filterLang('en',this)">English</button>
<button class="btn" onclick="filterLang('ewe',this)">Eʋegbe</button>
<button class="btn" onclick="filterLang('kabye',this)">Kabiyè</button>
</div>

<div class="grid" id="grid"></div>

<script>
const films=[
{name:"L'OR DU TOGO",lang:"fr",img:"https://via.placeholder.com/300x400/e50914/fff?text=OR+DU+TOGO"},
{name:"KOKO CITY",lang:"ewe",img:"https://via.placeholder.com/300x400/00a651/fff?text=KOKO+CITY"},
{name:"CABRAL",lang:"kabye",img:"https://via.placeholder.com/300x400/ffcc00/000?text=CABRAL"},
{name:"LOME NIGHTS",lang:"en",img:"https://via.placeholder.com/300x400/0066ff/fff?text=LOME+NIGHTS"},
{name:"TAXI MOTO",lang:"fr",img:"https://via.placeholder.com/300x400/ff6600/fff?text=TAXI+MOTO"},
{name:"MAMA TOGO",lang:"ewe",img:"https://via.placeholder.com/300x400/9900cc/fff?text=MAMA+TOGO"}
];
function afficher(list){document.getElementById('grid').innerHTML=list.map(f=>`<div class="card"><img src="${f.img}"><h3>${f.name}</h3></div>`).join('')}
function filtrer(){let q=document.getElementById('search').value.toLowerCase();afficher(films.filter(f=>f.name.toLowerCase().includes(q)))}
function filterLang(l,btn){document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(l==='all')afficher(films);else afficher(films.filter(f=>f.lang===l))}
afficher(films);
</script>
</body>
</html>
